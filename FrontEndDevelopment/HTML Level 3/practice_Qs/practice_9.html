<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>Registraction Form</h3>
    <form action="/server">
        <div>
            <label for="firstname">First Name:</label>
            <input type="text" id="firstname" name="firstname" placeholder="Enter your first name">
        </div>
        <div>
            <label for="lastname">Last Name:</label>
            <input type="text" id="lastname" name="lastname" placeholder="Enter your last name">
        </div>
        <div>
            <label for="gender">Please select gender: </label>
            <select name="gender" id="gender">
                <option value="">--Please Choose an Option--</option>
                <option value="male" selected>Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
        </div>
        <div>
            Do you agree to all terms of service?
            <input type="checkbox" name="terms-condition" id="terms-condition">
            <label for="terms-condition">Yes, I agree</label>
        </div>
        <div>
            <button>Submit</button>
        </div>
    </form>
</body>
</html>
