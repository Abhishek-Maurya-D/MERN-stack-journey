<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Feedback Form</h1>
    <form action="/server">
        <div>
            <label for="name">Name: </label>
            <input type="text" id="name" name="name" placeholder="Write Your Name">
        </div>
        <br>
        <div>
            <label for="email">Email: </label>
            <input type="text" id="email" name="email" placeholder="Write Your Email">
        </div>
        <br>
        <div>
            <label for="message">Message: </label>
            <br>
            <textarea id="message" name="message" rows="8" cols="32"></textarea>
        </div>
        <div>
            Rate us our of 5: 
            <br>
            <input type="radio" id="1" name="rate">
            <label for="1"> 1</label><br>
            <input type="radio" id="2" name="rate">
            <label for="2"> 2</label><br>
            <input type="radio" id="3" name="rate">
            <label for="3"> 3</label><br>
            <input type="radio" id="4" name="rate">
            <label for="4"> 4</label><br>
            <input type="radio" id="5" name="rate">
            <label for="5"> 5</label><br>
        </div><br>
        <button>Send your message!</button>
    </form>
</body>
</html>
